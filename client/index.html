<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WatchSync - Watch Together, Anywhere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Mobile height fix */
      body {
        min-height: 100dvh;
        background-color: #131314;
      }

      .speaking-glow {
        box-shadow: 0 0 12px rgba(78, 222, 163, 0.4);
        border: 2px solid #4edea3;
      }

      /* Custom slider for mobile */
      input[type=range].accent-white::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 12px;
        width: 12px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -4px;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface selection:bg-primary/30 antialiased overflow-x-hidden">
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
